version: '3.8'

services:
  metrics-collector:
    build:
      context: ..
      dockerfile: deployments/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - SERVER_PORT=8080
      - READ_TIMEOUT_SEC=5
      - WRITE_TIMEOUT_SEC=10
      - METRICS_UPDATE_INTERVAL_SEC=2
    restart: unless-stopped